<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: rgb(209, 209, 209);
        }

        .main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Centers vertically on the whole page */
            row-gap: 20px;
        }

        .frm {
            display: block;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
    </style>

</head>

<body>
    <div class="main">
        <h1 class="head mb-4">
            Sentiment Analysis
        </h1>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger" role="alert" style="max-width: 500px; width: 100%;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/" method="post" class="frm">
            <div class="mb-3">
                <label for="formGroupExampleInput" class="form-label">Enter your link or text:</label>
                <input type="text" class="form-control" name="link" id="formGroupExampleInput"
                    enctype="multipart/form-data" placeholder="Paste URL here..." required>
            </div>
            
            <div class="mb-4">
                <label for="select-element" class="form-label">Choose an option:</label>
                <select id="select-element" name="option" class="form-select">
                    <option value="yt" selected>Youtube Comment</option>
                    <option value="amazon">Amazon Product Link</option>
                    <option value="st">Sentence</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Analyze Sentiment</button>
        </form>
    </div>
</body>

</html>
